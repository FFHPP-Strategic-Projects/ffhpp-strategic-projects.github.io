    :root {

   body {

    .container{

    }

    /* -------------------------------
       Cards (rounded, soft borders, hover shadow)
    --------------------------------*/
    .card-grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); /* roomy like the screenshot */
  gap: 16px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;                      /* round */
  padding: 18px 18px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);   /* subtle */
  transition: box-shadow .2s ease, transform .05s ease;
}
.card:hover {
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}
.card h3 {
  margin: 0 0 6px;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-900);
}
.card .meta {
  margin: 2px 0 12px;
  color: var(--muted);
  font-size: 0.95rem;
}

  .actions {
  margin-top: 6px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  display: inline-block;
  padding: 10px 16px;           /* pill height */
  border-radius: 9999px;        /* ← pill shape */
  font-weight: 700;
  text-decoration: none;
  border: 1px solid transparent;
  line-height: 1;
  transition: filter .15s ease, background-color .15s ease, border-color .15s ease;
}

.btn:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 2px;
}

.btn.primary {
  background: var(--button-blue);
  color: #fff;
}
.btn.primary:hover {
  background: var(--button-blue-hover);
}

.btn.secondary {
  background: #fff;
  color: var(--button-blue);
  border-color: var(--button-blue);      /* outlined look */
}
.btn.secondary:hover {
  filter: brightness(0.98);
}
    
    .section-label {
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 0.78rem;
  color: var(--muted);
  margin: 6px 0 6px;
}
h1 {
  margin: 0 0 6px;
  color: var(--text-900);
  font-size: 1.6rem;
}

    .toolbar {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  margin: 10px 0 8px;
}
.search {
  width: 280px;
  max-width: 100%;
  padding: 10px 12px;
  border-radius: 9999px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-900);
}
.search::placeholder { color: #9AA3AF; }

    /* Footer */
    footer{
      border-top:1px solid var(--border);
      color:var(--text-600);
      font-size:.95rem;
      text-align:center;
      padding:18px 12px 34px;
      background:#fff;
    }
